<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <rect width="1440" height="900" fill="#FAFAF7"/>
  <!-- shell nav -->
  <line x1="0" y1="56" x2="1440" y2="56" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="36" font-size="14" font-weight="600" fill="#171717">Contract Studio</text>
  <text x="200" y="36" font-size="13" fill="#6B7280">대시보드</text>
  <text x="280" y="36" font-size="13" font-weight="600" fill="#171717">스튜디오</text>
  <line x1="280" y1="44" x2="332" y2="44" stroke="#1E5B3A" stroke-width="2"/>
  <text x="520" y="36" font-size="14" fill="#171717">용역계약서 초안 · 2026-05 거래</text>
  <text x="1380" y="36" font-size="12" fill="#2F7C58" text-anchor="end">저장됨</text>
  <!-- slot strip -->
  <line x1="0" y1="96" x2="1440" y2="96" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="82" font-size="12" fill="#6B7280">열린 자리</text>
  <text x="140" y="82" font-size="13" fill="#171717">제3조 금액</text>
  <text x="280" y="82" font-size="13" fill="#171717">제4조 지연 기준</text>
  <text x="460" y="82" font-size="12" fill="#6B7280">현재:</text>
  <text x="510" y="82" font-size="13" font-weight="600" fill="#1E5B3A">제8조 특약 1항</text>
  <line x1="510" y1="90" x2="640" y2="90" stroke="#1E5B3A" stroke-width="1"/>
  <!-- center column max-width 680 — paragraphs -->
  <text x="320" y="156" font-size="18" font-weight="600" fill="#171717">제8조 (특약사항)</text>
  <text x="320" y="200" font-size="14" fill="#171717">① 갑과 을은 본 계약과 관련하여 발생하는 분쟁에 대하여</text>
  <text x="320" y="222" font-size="14" fill="#171717">상호 협의로 해결함을 원칙으로 하며, 협의가 이루어지지</text>
  <text x="320" y="244" font-size="14" fill="#171717">않을 경우 다음 각 호에 따른다.</text>
  <text x="320" y="288" font-size="14" fill="#171717">1. 관할 법원은</text>
  <!-- inline editable slot input (focused) -->
  <rect x="440" y="270" width="240" height="28" fill="#FFFFFF" stroke="#1E5B3A" stroke-width="1.5"/>
  <text x="452" y="289" font-size="13" fill="#171717">서울중앙지방법원</text>
  <line x1="654" y1="277" x2="654" y2="291" stroke="#1E5B3A" stroke-width="1"/>
  <text x="688" y="288" font-size="14" fill="#171717">으로 한다.</text>
  <text x="320" y="332" font-size="14" fill="#171717">2. 적용 법령은 대한민국 법령으로 한다.</text>
  <text x="320" y="376" font-size="14" fill="#171717">3. 본 계약에 명시되지 아니한 사항은 일반 상관례에 따른다.</text>
  <text x="320" y="420" font-size="14" fill="#6B7280">② 본 조의 효력은 계약 체결일로부터 발생한다.</text>
  <!-- right rail: agent conversation -->
  <line x1="1040" y1="96" x2="1040" y2="900" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1064" y="132" font-size="12" fill="#6B7280" letter-spacing="1">에이전트</text>
  <!-- system bubble -->
  <rect x="1064" y="148" width="336" height="92" fill="#F6F4EE" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1080" y="174" font-size="13" fill="#171717">제8조 1항의 관할 법원을</text>
  <text x="1080" y="194" font-size="13" fill="#171717">어디로 지정하시겠습니까?</text>
  <text x="1080" y="220" font-size="12" fill="#6B7280">기본값: 서울중앙지방법원</text>
  <!-- user bubble -->
  <rect x="1064" y="264" width="336" height="68" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1080" y="290" font-size="13" fill="#171717">서울중앙지방법원으로 지정해</text>
  <text x="1080" y="310" font-size="13" fill="#171717">주세요.</text>
  <!-- collapsed tool trace 1 -->
  <line x1="1064" y1="368" x2="1400" y2="368" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1064" y="392" font-size="12" fill="#6B7280">›</text>
  <text x="1080" y="392" font-size="12" fill="#171717">답변을 수정 범위에 연결함</text>
  <text x="1400" y="392" font-size="11" fill="#6B7280" text-anchor="end">제8조 1항 · 84ms</text>
  <!-- collapsed tool trace 2 -->
  <line x1="1064" y1="412" x2="1400" y2="412" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1064" y="436" font-size="12" fill="#6B7280">›</text>
  <text x="1080" y="436" font-size="12" fill="#171717">조항에 반영함</text>
  <text x="1400" y="436" font-size="11" fill="#6B7280" text-anchor="end">p_0482 · 128ms</text>
  <line x1="1064" y1="456" x2="1400" y2="456" stroke="#E5E7EB" stroke-width="1"/>
  <!-- agent input -->
  <rect x="1064" y="828" width="336" height="44" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1080" y="855" font-size="13" fill="#6B7280">자연어로 답변하기…</text>
</svg>
